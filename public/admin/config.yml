# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: Minyaako/blog-style
  branch: main

local_backend: true

collections:
  - name: tags
    label: 标签
    label_singular: 标签
    folder: src/content/tags
    create: true
    extension: json
    format: json
    identifier_field: id
    slug: '{{fields.id}}'
    summary: '{{label}} · {{id}}'
    fields:
      - { name: id, label: 稳定 ID, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', '仅可使用小写字母、数字和连字符'] }
      - { name: label, label: 显示名称, widget: string }
      - { name: aliases, label: 别名, widget: list, required: false, default: [] }
      - { name: description, label: 描述, widget: text }

  - name: posts
    label: 文章
    label_singular: 文章
    folder: src/content/posts
    create: true
    nested:
      depth: 2
    extension: mdx
    format: frontmatter
    identifier_field: title
    slug: '{{slug}}'
    fields:
      - { name: id, label: 稳定 ID, widget: string, pattern: ['^[a-z0-9][a-z0-9-]+$', '仅可使用小写字母、数字和连字符'] }
      - { name: title, label: 标题, widget: string }
      - { name: description, label: 摘要, widget: text }
      - { name: publishedAt, label: 发布日期, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: domain, label: 大类, widget: select, options: [academic, engineering, life, games] }
      - { name: subcategory, label: 子类, widget: string }
      - name: tags
        label: 标签
        widget: relation
        collection: tags
        multiple: true
        required: false
        default: []
        value_field: id
        display_fields: [label, id]
        search_fields: [label, id, aliases]
      - { name: collections, label: 合集, widget: list, required: false, default: [] }
      - name: cover
        label: 封面
        widget: object
        required: false
        fields:
          - { name: url, label: URL, widget: string }
          - { name: alt, label: 替代文本, widget: string }
          - { name: credit, label: 来源说明, widget: string }
          - { name: sourceUrl, label: 来源链接, widget: string, required: false }
      - { name: authors, label: 作者, widget: list, default: [Demo Author] }
      - { name: draft, label: 草稿, widget: boolean, default: true }
      - { name: featured, label: 首页推荐, widget: boolean, default: false }
      - { name: lang, label: 语言, widget: hidden, default: zh-CN }
      - { name: translationKey, label: 翻译关联键, widget: string }
      - { name: license, label: 许可, widget: hidden, default: CC-BY-4.0 }
      - name: contentWarning
        label: 内容提示
        widget: object
        fields:
          - { name: type, label: 类型, widget: select, options: [none, spoiler, sensitive], default: none }
          - { name: message, label: 提示文字, widget: string, required: false, default: '' }
          - { name: scope, label: 范围, widget: select, options: [none, page, blocks], default: none }
      - { name: body, label: 正文, widget: markdown }
